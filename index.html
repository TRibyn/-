<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Расчет сметы</title>
    <!-- Подключаем Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем Tailwind CSS для стилей -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: var(--tg-theme-bg-color, #f3f4f6);
            color: var(--tg-theme-text-color, #1f2937);
        }
        .tg-card {
            background-color: var(--tg-theme-secondary-bg-color, #ffffff);
        }
        .tg-btn {
            background-color: var(--tg-theme-button-color, #2563eb);
            color: var(--tg-theme-button-text-color, #ffffff);
        }
        .tg-hint {
            color: var(--tg-theme-hint-color, #9ca3af);
        }
    </style>
</head>
<body class="p-4 font-sans select-none pb-24">

    <!-- Хедер приложения -->
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-bold">Калькулятор сметы</h1>
            <p id="user-greeting" class="text-xs tg-hint">Приветствуем!</p>
        </div>
        <button onclick="resetEstimate()" class="text-xs text-red-500 font-semibold border border-red-500 rounded px-2 py-1 hover:bg-red-50">
            Сбросить
        </button>
    </div>

    <!-- Быстрое добавление популярных позиций -->
    <div class="mb-6">
        <label class="block text-xs font-semibold uppercase tracking-wider mb-2 tg-hint">Добавить из прайса:</label>
        <div class="flex flex-wrap gap-2">
            <button onclick="addPresetItem('Монтаж кабеля', 4, 'м.')" class="tg-card text-xs px-3 py-1.5 rounded-full border border-gray-200 shadow-sm active:scale-95 transition">+ Кабель (м)</button>
            <button onclick="addPresetItem('Установка IP-камеры', 45, 'шт.')" class="tg-card text-xs px-3 py-1.5 rounded-full border border-gray-200 shadow-sm active:scale-95 transition">+ Камера (шт)</button>
            <button onclick="addPresetItem('Монтаж розетки/выключателя', 8, 'шт.')" class="tg-card text-xs px-3 py-1.5 rounded-full border border-gray-200 shadow-sm active:scale-95 transition">+ Розетка (шт)</button>
            <button onclick="addPresetItem('Настройка видеорегистратора', 60, 'услуга')" class="tg-card text-xs px-3 py-1.5 rounded-full border border-gray-200 shadow-sm active:scale-95 transition">+ Регистратор</button>
        </div>
    </div>

    <!-- Список позиций в смете -->
    <div id="estimate-list" class="space-y-3 mb-6">
        <!-- Сюда динамически добавляются строки -->
    </div>

    <!-- Кнопка добавления кастомной строки -->
    <button onclick="addCustomItem()" class="w-full py-2.5 mb-6 rounded-xl border-2 border-dashed border-gray-300 font-medium text-sm flex justify-center items-center gap-1 hover:bg-gray-50 active:scale-98 transition">
        <span>+ Добавить свою позицию</span>
    </button>

    <!-- Фиксированный футер с итогом и отправкой -->
    <div class="fixed bottom-0 left-0 right-0 p-4 tg-card border-t border-gray-100 shadow-lg flex items-center justify-between gap-4">
        <div>
            <span class="block text-xs uppercase font-bold tg-hint">Итого:</span>
            <span id="grand-total" class="text-2xl font-black text-blue-600">0.00 BYN</span>
        </div>
        <button id="main-submit" onclick="sendEstimateToBot()" class="tg-btn px-6 py-3 rounded-xl font-bold text-sm shadow-md active:scale-95 transition flex-1 text-center">
            Отправить в чат
        </button>
    </div>

    <!-- Скрипт логики приложения -->
    <script>
        const tg = window.Telegram.WebApp;
        
        // Инициализация WebApp внутри Telegram
        tg.ready();
        tg.expand(); // Разворачиваем во весь экран для удобства

        // Отображение имени пользователя, если доступно
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            document.getElementById('user-greeting').innerText = `Мастер: ${tg.initDataUnsafe.user.first_name}`;
        }

        // Хранилище для элементов сметы
        let items = [];

        // Функция добавления готовой позиции из прайса
        function addPresetItem(name, price, unit) {
            const newItem = {
                id: Date.now() + Math.random(),
                name: name,
                price: price,
                quantity: 1,
                unit: unit
            };
            items.push(newItem);
            renderList();
        }

        // Функция добавления пустой строки для кастомного ввода
        function addCustomItem() {
            addPresetItem('', 0, 'шт.');
        }

        // Удаление позиции
        function deleteItem(id) {
            items = items.filter(item => item.id !== id);
            renderList();
        }

        // Обновление данных при вводе пользователем
        function updateItemProperty(id, property, value) {
            const item = items.find(item => item.id === id);
            if (item) {
                if (property === 'price' || property === 'quantity') {
                    item[property] = parseFloat(value) || 0;
                } else {
                    item[property] = value;
                }
                calculateTotal();
                // Обновляем локальную субсумму конкретной строки без полного ререндера для плавности ввода
                const rowTotalSpan = document.getElementById(`subtotal-${id}`);
                if (rowTotalSpan) {
                    rowTotalSpan.innerText = `${(item.price * item.quantity).toFixed(2)} BYN`;
                }
            }
        }

        // Расчет общей стоимости
        function calculateTotal() {
            const total = items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('grand-total').innerText = `${total.toFixed(2)} BYN`;
            return total;
        }

        // Сброс сметы
        function resetEstimate() {
            items = [];
            renderList();
        }

        // Рендеринг списка на экране
        function renderList() {
            const listContainer = document.getElementById('estimate-list');
            listContainer.innerHTML = '';

            if (items.length === 0) {
                listContainer.innerHTML = `<div class="text-center py-8 text-sm tg-hint">Смета пуста. Добавьте материалы или работы выше.</div>`;
                calculateTotal();
                return;
            }

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'tg-card p-4 rounded-xl border border-gray-100 shadow-sm relative flex flex-col gap-3';
                card.innerHTML = `
                    <button onclick="deleteItem(${item.id})" class="absolute top-3 right-3 text-gray-400 hover:text-red-500 text-lg">&times;</button>
                    
                    <!-- Наименование -->
                    <div>
                        <input type="text" value="${item.name}" placeholder="Наименование работ/материалов" 
                            oninput="updateItemProperty(${item.id}, 'name', this.value)"
                            class="w-5/6 bg-transparent font-semibold border-b border-transparent hover:border-gray-200 focus:border-blue-500 focus:outline-none text-sm py-0.5">
                    </div>

                    <!-- Параметры: Цена, Кол-во, Ед. изм -->
                    <div class="flex items-center justify-between gap-2 text-xs">
                        <div class="flex items-center gap-1 w-2/3">
                            <input type="number" value="${item.price}" placeholder="Цена" step="any"
                                oninput="updateItemProperty(${item.id}, 'price', this.value)"
                                class="w-20 px-2 py-1 rounded bg-gray-100 border-none focus:ring-1 focus:ring-blue-500 text-center font-medium">
                            <span class="tg-hint">BYN &times;</span>
                            
                            <input type="number" value="${item.quantity}" placeholder="Кол-во" step="any"
                                oninput="updateItemProperty(${item.id}, 'quantity', this.value)"
                                class="w-16 px-2 py-1 rounded bg-gray-100 border-none focus:ring-1 focus:ring-blue-500 text-center font-medium">
                            
                            <input type="text" value="${item.unit}" placeholder="ед." 
                                oninput="updateItemProperty(${item.id}, 'unit', this.value)"
                                class="w-12 bg-transparent text-center tg-hint border-b border-transparent focus:border-gray-300 focus:outline-none">
                        </div>

                        <!-- Итого за строку -->
                        <div class="text-right font-bold text-sm text-gray-700">
                            <span id="subtotal-${item.id}">${(item.price * item.quantity).toFixed(2)} BYN</span>
                        </div>
                    </div>
                `;
                listContainer.appendChild(card);
            });

            calculateTotal();
        }

        // Отправка данных обратно боту
        function sendEstimateToBot() {
            if (items.length === 0) {
                tg.showAlert("Смета пуста! Добавьте хотя бы одну позицию.");
                return;
            }

            const totalSum = calculateTotal();
            const dataToSend = {
                items: items.map(i => ({ name: i.name, price: i.price, qty: i.quantity, unit: i.unit })),
                total: totalSum
            };

            // Метод SDK отправляет строку в бэкенд бота (срабатывает событие web_app_data)
            tg.sendData(JSON.stringify(dataToSend));
            tg.close(); // Закрываем мини-приложение после отправки
        }

        // Первичный пустой рендер
        renderList();
    </script>
</body>
</html>
